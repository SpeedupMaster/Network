name: Sync MetaCubeX rules for Egern

on:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * *'

permissions:
  contents: write

concurrency:
  group: sync-metacubex-egern
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Convert MetaCubeX rules to Egern
        run: npm run sync:metacubex

      - name: Commit updated rule sets
        run: |
          if [ -z "$(git status --porcelain -- Egern_RuleSets Egern_MetaCubeX_RuleSources.json)" ]; then
            echo "No rule changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Egern_RuleSets Egern_MetaCubeX_RuleSources.json
          git commit -m "chore: sync metacubex egern rules"
          git push
